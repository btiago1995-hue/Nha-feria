          ]

        {
          "@type": "SoftwareApplication",
          "@id": "https://nhaferia.cv/#app",
          "name": "Nha Féria",
          "url": "https://nhaferia.cv",
          "applicationCategory": "BusinessApplication",

            {
              "@type": "Offer",

        },
        {
          "@type": "FAQPage",
          "@id": "https://nhaferia.cv/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "A Nha Féria respeita a legislação cabo-verdiana?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sim. A plataforma foi construída especificamente para Cabo Verde, respeitando o direito a 22 dias úteis de férias por ano e as regras de acumulação e acréscimo previstas na lei."
              }
            },
            {
              "@type": "Question",
              "name": "Como convido a minha equipa?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Basta criar os perfis dos teus colaboradores e partilhar o link de convite por WhatsApp ou email. A criação de conta é feita em menos de 1 minuto, sem burocracia."
              }
            },
            {
              "@type": "Question",
              "name": "Os dados ficam guardados onde?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Todos os dados são alojados na Europa (Frankfurt) em infraestrutura Supabase com backups diários e encriptação em repouso e em trânsito."
              }
            },
            {
              "@type": "Question",
              "name": "Existe período de prova gratuito?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "O plano Starter é gratuito para sempre até 5 colaboradores. O plano Pro inclui 14 dias de prova sem necessidade de cartão de crédito."
              }
            },
            {
              "@type": "Question",
              "name": "Posso exportar os dados?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sim. Podes exportar mapas anuais de férias em CSV a qualquer momento, para arquivo ou auditoria interna."
              }
            }
          ]
        }
